<style>
:root{--gl:#2ea65a;--gd:#0d4a22;--cyan:#4fc3f7;--gold:#e8c84a;--white:#f0f0eb;--gray:#777;--dark:#0e0e0e;--card:#181818;--border:#272727;--c-t:#1db954;--c-t-bg:rgba(29,185,84,.13);--c-exp:#e55c3c;--c-exp-bg:rgba(229,92,60,.13);--c-se:#5aad7e;--c-se-bg:rgba(90,173,126,.1);--c-sn:#2d6e4a;--c-sn-bg:rgba(45,110,74,.08);--c-se2:#9b59b6;--c-se2-bg:rgba(155,89,182,.1)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--dark);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh}
header{background:linear-gradient(180deg,#081e0f,#0e0e0e);border-bottom:2px solid #0d3a1d;padding:0 20px;position:sticky;top:0;z-index:200}
.hi{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:8px;min-height:58px;flex-wrap:wrap;padding:8px 0}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:3px;cursor:pointer;flex-shrink:0}
.logo span:nth-child(odd){color:var(--cyan)}.logo span:nth-child(even){color:var(--gl)}
nav{display:flex;gap:2px;flex-wrap:wrap}
nav button{background:none;border:none;color:#888;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;padding:5px 12px;border-radius:6px;cursor:pointer;transition:all .15s}
nav button:hover{color:var(--white);background:rgba(255,255,255,.05)}
nav button.active{color:var(--gl);background:rgba(30,120,60,.15)}
.cat-tabs{display:flex;gap:6px;margin-bottom:18px}
.cat-tab{background:var(--card);border:1px solid var(--border);color:#888;padding:6px 16px;border-radius:8px;cursor:pointer;font-size:.82rem;font-weight:600;transition:all .15s}
.cat-tab:hover{color:var(--white);border-color:#555}.cat-tab.active{background:var(--gd);border-color:var(--gl);color:var(--gl)}
.container{max-width:1100px;margin:0 auto;padding:28px 20px}
.page{display:none}.page.active{display:block}
.year-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.year-btn{background:var(--card);border:1px solid var(--border);color:#888;font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:1px;padding:7px 16px;border-radius:8px;cursor:pointer;transition:all .15s}
.year-btn:hover{border-color:var(--gl);color:var(--white)}.year-btn.active{background:var(--gd);border-color:var(--gl);color:var(--gl)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:10px;margin-bottom:22px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat-card .num{font-family:'Bebas Neue',sans-serif;font-size:2.3rem;line-height:1;color:var(--gl)}.stat-card .num.gold{color:var(--gold)}.stat-card .num.red{color:#e55}
.stat-card .lbl{font-size:.66rem;color:var(--gray);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:2px;color:var(--gold);margin-bottom:11px;margin-top:4px}
.match-list{display:flex;flex-direction:column;gap:5px}
.match-row{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:11px 15px;display:grid;grid-template-columns:1fr auto 32px auto;align-items:center;gap:10px;cursor:pointer;transition:border-color .15s,background .15s}
.match-row:hover{border-color:#404040;background:#1e1e1e}
.match-opp{font-weight:500;font-size:.9rem}.match-meta{font-size:.68rem;color:var(--gray);margin-top:2px;display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.match-score{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:2px;text-align:center;white-space:nowrap}
.match-scorers{font-size:.68rem;color:#999;text-align:right;max-width:160px}
.badge{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:5px;font-family:'Bebas Neue',sans-serif;font-size:.8rem}
.badge-W{background:rgba(30,140,60,.2);color:var(--gl);border:1px solid var(--gd)}.badge-D{background:rgba(200,160,30,.15);color:var(--gold);border:1px solid rgba(200,160,30,.3)}.badge-L{background:rgba(200,50,50,.15);color:#e66;border:1px solid rgba(200,50,50,.3)}
.filter-row{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.filter-btn{background:var(--card);border:1px solid var(--border);color:#999;padding:4px 11px;border-radius:20px;cursor:pointer;font-size:.75rem;transition:all .15s}
.filter-btn:hover{border-color:#555;color:var(--white)}.filter-btn.active{background:var(--gd);border-color:var(--gl);color:var(--gl)}
.players-table{width:100%;border-collapse:collapse}
.players-table th{text-align:left;font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--gray);padding:7px 10px;border-bottom:1px solid var(--border)}.players-table th.nr{text-align:right}
.players-table td{padding:8px 10px;border-bottom:1px solid #1a1a1a;font-size:.86rem}.players-table tr:hover td{background:rgba(255,255,255,.018)}.players-table td.nr{text-align:right;font-family:'Bebas Neue',sans-serif;font-size:.98rem}
.td-goals{color:var(--gold)}.td-apps{color:var(--gl)}.td-red{color:#e55}
.history-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(205px,1fr));gap:11px}
.history-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.history-card:hover{border-color:var(--gl);transform:translateY(-2px)}.history-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gl)}
.hc-open{border-color:var(--gl)!important;background:#131313}
.hy-year{font-family:'Bebas Neue',sans-serif;font-size:1.75rem;color:var(--gl);letter-spacing:2px}.hy-record{font-size:.84rem;color:#bbb;margin-top:5px}
.mini-bar{display:flex;height:5px;border-radius:3px;overflow:hidden;margin-top:8px;gap:2px}.mini-W{background:var(--gl)}.mini-D{background:var(--gold)}.mini-L{background:#e55}
.hist-tabs{display:flex;gap:7px;margin-bottom:18px;flex-wrap:wrap}
.hist-tab{background:var(--card);border:1px solid var(--border);color:#888;padding:7px 17px;border-radius:8px;cursor:pointer;font-size:.82rem;font-weight:500;transition:all .15s}
.hist-tab:hover{color:var(--white);border-color:#555}.hist-tab.active{background:var(--gd);border-color:var(--gl);color:var(--gl)}
.rivals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:7px}
.rival-card{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:11px 15px;cursor:pointer;transition:all .14s;display:flex;align-items:center;gap:11px}
.rival-card:hover{border-color:var(--gl);background:#1e1e1e}.rival-name{font-weight:600;font-size:.88rem;flex:1}
.rival-pj{font-size:.76px;color:var(--gray)}.rv{font-family:'Bebas Neue',sans-serif;font-size:.92rem}.rv.w{color:var(--gl)}.rv.d{color:var(--gold)}.rv.l{color:#e55}
.rival-bar{display:flex;height:3px;border-radius:2px;overflow:hidden;margin-top:4px;gap:1px}
.rdh{background:linear-gradient(135deg,var(--gd),#111);border:1px solid var(--gl);border-radius:12px;padding:20px;margin-bottom:20px}
.rdhn{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:3px}
.rdhs{display:flex;gap:16px;margin-top:9px;flex-wrap:wrap}.rds{text-align:center}
.rds .n{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;line-height:1}.rds .l{font-size:.63rem;color:var(--gray);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.at-header{background:linear-gradient(135deg,var(--gd),#0e0e0e);border:1px solid var(--gl);border-radius:14px;padding:24px;margin-bottom:24px;text-align:center}
.at-header h1{font-family:'Bebas Neue',sans-serif;font-size:2.6rem;letter-spacing:4px}.at-header p{color:var(--gray);margin-top:5px;font-size:.84rem}
.top-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
@media(max-width:640px){.top-grid{grid-template-columns:1fr}}
.leaderboard{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.lb-head{padding:11px 15px;border-bottom:1px solid var(--border);font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:2px;color:var(--gold)}
.lb-row{display:flex;align-items:center;padding:9px 15px;border-bottom:1px solid #1a1a1a;gap:9px;transition:background .12s}
.lb-row:hover{background:rgba(255,255,255,.02)}.lb-row:last-child{border-bottom:none}
.lb-rank{font-family:'Bebas Neue',sans-serif;font-size:.93rem;color:var(--gray);width:20px;text-align:right;flex-shrink:0}
.lb-rank.gold{color:var(--gold)}.lb-rank.silver{color:#ccc}.lb-rank.bronze{color:#cd7f32}
.lb-name{flex:1;font-weight:500;font-size:.85rem}.lb-val{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:1px}
.lb-val.goals{color:var(--gold)}.lb-val.apps{color:var(--gl)}
.back-btn{display:inline-flex;align-items:center;gap:7px;color:var(--gl);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;margin-bottom:16px;padding:0;transition:color .15s}
.back-btn:hover{color:var(--white)}
.match-hero{background:linear-gradient(135deg,#0d3a1d,#111);border:1px solid var(--gd);border-radius:14px;padding:24px 20px;margin-bottom:16px}
.hero-top{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center}
.hero-team{text-align:center}.hero-name{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px}
.hero-name.us{color:var(--gl)}.hero-name.them{color:var(--white)}
.hero-score{font-family:'Bebas Neue',sans-serif;font-size:3.2rem;line-height:1;letter-spacing:4px;text-align:center}
.hero-badge{display:inline-block;margin-top:5px;padding:2px 9px;border-radius:4px;font-family:'Bebas Neue',sans-serif;font-size:.86rem;letter-spacing:1px}
.hero-badge.W{background:rgba(30,140,60,.2);color:var(--gl)}.hero-badge.D{background:rgba(200,160,30,.15);color:var(--gold)}.hero-badge.L{background:rgba(200,50,50,.15);color:#e66}

function sortSq(entries){return[...entries].sort(([na,sa],[nb,sb])=>{const ia=PRIORITY.indexOf(na.toUpperCase()),ib=PRIORITY.indexOf(nb.toUpperCase());const pa=ia!==-1&&(sa==='titular'||sa==='titular_expelled'),pb=ib!==-1&&(sb==='titular'||sb==='titular_expelled');if(pa&&!pb)return -1;if(!pa&&pb)return 1;if(pa&&pb)return ia-ib;const si_a=SO.indexOf(sa),si_b=SO.indexOf(sb);if(si_a!==si_b)return si_a-si_b;return na.localeCompare(nb);});}

  ALL_YEARS.forEach(y=>{getMs(y,'libres').forEach(m=>{t.pj++;t.gf+=m.our;t.gc+=m.their;if(m.result==='W')t.w++;else if(m.result==='L')t.l++;else t.d++;(m.scorers||[]).filter(s=>!s.own_goal).forEach(({name:n,count:c})=>{const k=n.toUpperCase();gm[k]=(gm[k]||0)+c;});Object.entries(m.squad||{}).forEach(([n,s])=>{if(['titular','titular_expelled','sub_enter','sub_expelled','unknown_green'].includes(s))am[n]=(am[n]||0)+1;});});});
  const gd=t.gf-t.gc,pct=Math.round(t.w/t.pj*100);
  let h=`<div class="at-header"><h1>ALL TIME</h1><p>Estadísticas Libres acumuladas 2016–2026</p></div><div class="stats-grid"><div class="stat-card"><div class="num">${t.pj}</div><div class="lbl">PJ</div></div><div class="stat-card"><div class="num">${t.w}</div><div class="lbl">Victorias</div></div><div class="stat-card"><div class="num gold">${t.d}</div><div class="lbl">Empates</div></div><div class="stat-card"><div class="num red">${t.l}</div><div class="lbl">Derrotas</div></div><div class="stat-card"><div class="num">${t.gf}</div><div class="lbl">GF</div></div><div class="stat-card"><div class="num red">${t.gc}</div><div class="lbl">GC</div></div><div class="stat-card"><div class="num">${gd>=0?'+':''}${gd}</div><div class="lbl">Dif</div></div><div class="stat-card"><div class="num gold">${pct}%</div><div class="lbl">%V</div></div></div><div class="top-grid">`;
  const tg=Object.entries(gm).sort((a,b)=>b[1]-a[1]).slice(0,10);
  h+=`<div class="leaderboard"><div class="lb-head">⚽ Máximos goleadores</div>`;tg.forEach(([n,c],i)=>{const r=['gold','silver','bronze'][i]||'';h+=`<div class="lb-row"><span class="lb-rank ${r}">${i+1}</span><span class="lb-name">${n}</span><span class="lb-val goals">${c}</span></div>`;});h+=`</div>`;
  const ta=Object.entries(am).sort((a,b)=>b[1]-a[1]).slice(0,10);
  h+=`<div class="leaderboard"><div class="lb-head">🏃 Más partidos jugados</div>`;ta.forEach(([n,c],i)=>{const r=['gold','silver','bronze'][i]||'';h+=`<div class="lb-row"><span class="lb-rank ${r}">${i+1}</span><span class="lb-name">${n}</span><span class="lb-val apps">${c}</span></div>`;});h+=`</div></div>`;
  h+=`<div class="sec-title" style="margin-top:7px">EVOLUCIÓN POR TEMPORADA</div><div class="leaderboard"><table class="players-table" style="min-width:100%"><thead><tr><th>Año</th><th class="nr">PJ</th><th class="nr">V</th><th class="nr">E</th><th class="nr">D</th><th class="nr">GF</th><th class="nr">GC</th><th class="nr">%V</th></tr></thead><tbody>`;
  [...ALL_YEARS].reverse().forEach(y=>{const ms=getMs(y,'libres');const w=ms.filter(m=>m.result==='W').length,d=ms.filter(m=>m.result==='D').length,l=ms.filter(m=>m.result==='L').length;const gf=ms.reduce((a,m)=>a+m.our,0),gc=ms.reduce((a,m)=>a+m.their,0);const p=ms.length?Math.round(w/ms.length*100):0;h+=`<tr><td><strong style="color:var(--gl)">${y}</strong></td><td class="nr">${ms.length}</td><td class="nr td-apps">${w}</td><td class="nr td-goals">${d}</td><td class="nr td-red">${l}</td><td class="nr">${gf}</td><td class="nr">${gc}</td><td class="nr" style="color:var(--gold)">${p}%</td></tr>`;});
  h+=`</tbody></table></div>`;document.getElementById('b-alltime').innerHTML=h;
}

// ── PLAYER STATS ──────────────────────────────────────────────────────────
const SCORER_ALIAS={'CACHE':'TINO CACHE','HUEVI':'HUEVO','MATI':'MATI PEBETE','MUTT':'MATTO MUT','URU':'URUGUAYO','VASKO':'VASCO','REBE':'REBECCA','DANO':'DANILO','PELU':'PELU'};
const SENIOR_YEARS_SET=new Set(['2023','2024','2025','2026']);
function canonicalName(name){if(!name)return null;const u=name.toUpperCase().trim();if(SCORER_ALIAS[u])return SCORER_ALIAS[u];return u;}
function buildTeamTotals(){const t={};ALL_YEARS.forEach(y=>{t[y]={libres:getMs(y,'libres').length};if(SENIOR_YEARS_SET.has(y))t[y].senior=getMs(y,'senior').length;});return t;}
let _teamTotals=null;
function getTeamTotals(){if(!_teamTotals)_teamTotals=buildTeamTotals();return _teamTotals;}

function buildPlayerStats(){
  const players={};
  function ensure(name){if(!players[name])players[name]={name,years:{},totalPJ:0,totalGoals:0,totalPens:0,totalReds:0,totalW:0,totalD:0,totalL:0,activeCats:new Set()};return players[name];}
  function ensureYear(p,year,cat){if(!p.years[year])p.years[year]={};if(!p.years[year][cat])p.years[year][cat]={pj:0,goals:0,pens:0,reds:0,w:0,d:0,l:0};return p.years[year][cat];}
  ALL_YEARS.forEach(year=>{
    ['libres','senior'].forEach(cat=>{
      if(cat==='senior'&&!SENIOR_YEARS_SET.has(year))return;
      getMs(year,cat).forEach(m=>{
        Object.entries(m.squad||{}).forEach(([pname,status])=>{
          if(!['titular','titular_expelled','sub_enter','sub_expelled','unknown_green'].includes(status))return;
          const p=ensure(pname);const y=ensureYear(p,year,cat);
          y.pj++;p.totalPJ++;p.activeCats.add(cat);
          if(status==='titular_expelled'||status==='sub_expelled'){y.reds++;p.totalReds++;}
          if(m.result==='W'){y.w++;p.totalW++;}else if(m.result==='L'){y.l++;p.totalL++;}else{y.d++;p.totalD++;}
        });
        const hasSquad=Object.keys(m.squad||{}).length>0;
        (m.scorers||[]).filter(s=>!s.own_goal).forEach(({name,count,penalty})=>{
          const canon=canonicalName(name);if(!canon)return;
          const p=ensure(canon);const y=ensureYear(p,year,cat);
          y.goals+=count;p.totalGoals+=count;
          if(penalty){y.pens+=count;p.totalPens+=count;}
          p.activeCats.add(cat);
          if(!hasSquad){if(!y._sm)y._sm=new Set();if(!y._sm.has(m.id)){y._sm.add(m.id);y.pj++;p.totalPJ++;if(m.result==='W'){y.w++;p.totalW++;}else if(m.result==='L'){y.l++;p.totalL++;}else{y.d++;p.totalD++;}}}
        });
      });
    });
  });
  Object.values(players).forEach(p=>{p.activeCats=[...p.activeCats];});return players;
}
let _playerCache=null;
function getPlayers(){if(!_playerCache)_playerCache=buildPlayerStats();return _playerCache;}
let playerSort='pj',playerSearch='';

function renderPlayersPage(){
  const players=getPlayers();let list=Object.values(players).filter(p=>p.totalPJ>0||p.totalGoals>0);
  if(playerSearch){const q=playerSearch.toUpperCase();list=list.filter(p=>p.name.toUpperCase().includes(q));}
  if(playerSort==='pj')list.sort((a,b)=>b.totalPJ-a.totalPJ||b.totalGoals-a.totalGoals);
  if(playerSort==='goals')list.sort((a,b)=>b.totalGoals-a.totalGoals||b.totalPJ-a.totalPJ);
  let h=`<input class="players-search" placeholder="🔍 Buscar jugador..." oninput="playerSearch=this.value;renderPlayersPage()" value="${playerSearch}"><div class="players-sort"><span style="font-size:.76rem;color:var(--gray);align-self:center">Ordenar:</span>${[['pj','Partidos'],['goals','Goles']].map(([k,l])=>`<button class="sort-btn ${playerSort===k?'active':''}" onclick="playerSort='${k}';renderPlayersPage()">${l}</button>`).join('')}</div><div class="players-grid">`;
  list.forEach(p=>{const hasSr=p.activeCats.includes('senior');const hasBoth=p.activeCats.includes('libres')&&hasSr;const gpj=p.totalPJ>0?(p.totalGoals/p.totalPJ).toFixed(2):'0.00';const sn=SHIRT[p.name];const av=sn!==undefined?sn:p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();h+=`<div class="player-card-list" onclick="openPlayerDetail('${encodeURIComponent(p.name)}'">${hasSr?`<span class="pcl-tag">${hasBoth?'L+Sr':'Sr'}</span>`:''}<div class="pcl-name">${p.name}</div><div class="pcl-stats"><div class="pcl-stat"><div class="n" style="color:var(--gl)">${p.totalPJ}</div><div class="l">PJ</div></div><div class="pcl-stat"><div class="n" style="color:var(--gold)">${p.totalGoals}</div><div class="l">Goles</div></div><div class="pcl-stat"><div class="n" style="color:var(--cyan)">${gpj}</div><div class="l">G/PJ</div></div>${p.totalReds>0?`<div class="pcl-stat"><div class="n" style="color:#e55">${p.totalReds}</div><div class="l">🟥</div></div>`:''}</div></div>`;});
  h+=`</div>`;document.getElementById('b-players').innerHTML=h;
}

function openPlayerDetail(enc){const name=decodeURIComponent(enc);prevPage=document.querySelector('.page.active').id.replace('page-','');document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page-player-detail').classList.add('active');renderPlayerDetail(name);window.scrollTo(0,0);}

function renderPlayerDetail(name){
  const players=getPlayers();const tt=getTeamTotals();const p=players[name];
  if(!p){document.getElementById('b-player-detail').innerHTML='<div class="empty">Jugador no encontrado</div>';return;}
  const wPct=p.totalPJ>0?Math.round(p.totalW/p.totalPJ*100):0;
  const gpj=p.totalPJ>0?(p.totalGoals/p.totalPJ).toFixed(2):'-';
  const hasSr=p.activeCats.includes('senior');const hasLib=p.activeCats.includes('libres');const hasBoth=hasLib&&hasSr;
  const activeYears=[...new Set(Object.keys(p.years))].sort();
  const sn=SHIRT[name];const av=sn!==undefined?sn:name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const avFs=sn!==undefined?(String(sn).length>1?'1.2rem':'1.6rem'):'1.6rem';
  let libPJ=0,srPJ=0,libT=0,srT=0;
  activeYears.forEach(y=>{const yd=p.years[y]||{};if(yd.libres&&(yd.libres.pj>0||yd.libres.goals>0)){libT+=tt[y]?.libres||0;libPJ+=yd.libres?.pj||0;}if(hasSr&&(yd.senior?.pj>0||yd.senior?.goals>0)){srT+=tt[y]?.senior||0;srPJ+=yd.senior?.pj||0;}});
  const libPct=libT>0?Math.round(libPJ/libT*100):null;const srPct=srT>0?Math.round(srPJ/srT*100):null;const combPct=(libT+srT)>0?Math.round((libPJ+srPJ)/(libT+srT)*100):null;
  let h=`<button class="back-btn" onclick="goBack()"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M10 3L5 8l5 5"/></svg> Volver a estadísticas</button>
  <div class="pd-hero"><div class="pd-avatar" style="font-size:${avFs}">${av}</div><div class="pd-info"><div class="pd-name">${name}${hasBoth?'<span class="pd-sr-badge">L+Sr</span>':hasSr?'<span class="pd-sr-badge">Senior</span>':''}</div><div class="pd-years">${activeYears[0]}${activeYears.length>1?' – '+activeYears[activeYears.length-1]:''} · ${activeYears.length} temporada${activeYears.length>1?'s':''}</div></div></div>`;
  h+=`<div class="pd-stats-row"><div class="pd-stat"><div class="n">${p.totalPJ}</div><div class="l">Total PJ</div></div><div class="pd-stat"><div class="n gold">${p.totalGoals}</div><div class="l">Goles</div></div>${p.totalPens>0?`<div class="pd-stat"><div class="n gold">${p.totalPens}</div><div class="l">Penales</div></div>`:''}<div class="pd-stat"><div class="n cyan">${gpj}</div><div class="l">Goles/PJ</div></div><div class="pd-stat"><div class="n">${p.totalW}</div><div class="l">Victorias</div></div><div class="pd-stat"><div class="n gold">${p.totalD}</div><div class="l">Empates</div></div><div class="pd-stat"><div class="n red">${p.totalL}</div><div class="l">Derrotas</div></div><div class="pd-stat"><div class="n gold">${wPct}%</div><div class="l">% victorias</div></div>${p.totalReds>0?`<div class="pd-stat"><div class="n red">${p.totalReds}</div><div class="l">🟥 Rojas</div></div>`:''} ${combPct!==null&&hasBoth?`<div class="pd-stat"><div class="n cyan">${combPct}%</div><div class="l">Presencia total</div></div>`:''}${libPct!==null&&!hasSr?`<div class="pd-stat"><div class="n cyan">${libPct}%</div><div class="l">Presencia</div></div>`:''}</div>`;
  if(hasBoth){h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px"><div class="pd-stat" style="text-align:left;padding:14px 16px"><div style="font-size:.7rem;color:var(--gl);font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">Libres</div><div style="display:flex;gap:14px;flex-wrap:wrap"><div class="pcl-stat"><div class="n" style="color:var(--gl)">${libPJ}</div><div class="l">PJ</div></div>${libPct!==null?`<div class="pcl-stat"><div class="n" style="color:var(--cyan)">${libPct}%</div><div class="l">Presencia</div></div>`:''}</div></div><div class="pd-stat" style="text-align:left;padding:14px 16px"><div style="font-size:.7rem;color:var(--cyan);font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">Senior</div><div style="display:flex;gap:14px;flex-wrap:wrap"><div class="pcl-stat"><div class="n" style="color:var(--cyan)">${srPJ}</div><div class="l">PJ</div></div>${srPct!==null?`<div class="pcl-stat"><div class="n" style="color:var(--cyan)">${srPct}%</div><div class="l">Presencia</div></div>`:''}</div></div></div>`;}
  h+=`<div class="pd-wdl"><div class="mini-W" style="flex:${p.totalW||.001}"></div><div class="mini-D" style="flex:${p.totalD||.001}"></div><div class="mini-L" style="flex:${p.totalL||.001}"></div></div><div style="font-size:.68rem;color:var(--gray);margin-bottom:18px">${p.totalW}V · ${p.totalD}E · ${p.totalL}D</div>`;
  h+=`<div class="sec-title">DESGLOSE POR AÑO</div><div class="leaderboard"><table class="pd-year-table"><thead><tr><th>Año</th><th>Cat</th><th>PJ</th><th>Presencia</th><th>Goles</th><th>Pen</th><th>G/PJ</th><th>V</th><th>E</th><th>D</th><th>%V</th><th>🟥</th></tr></thead><tbody>`;
  activeYears.forEach(year=>{const yd=p.years[year]||{};const cats=['libres','senior'].filter(c=>yd[c]&&(yd[c].pj>0||yd[c].goals>0));if(!cats.length)return;const showComb=cats.length>1;cats.forEach((cat,ci)=>{const s=yd[cat];const tot=tt[year]?.[cat]||0;const pct=tot>0?Math.round(s.pj/tot*100):'-';const pd=tot>0?`${s.pj}/${tot} (${pct}%)`:String(s.pj);const gpp=s.pj>0?(s.goals/s.pj).toFixed(2):'0.00';const wp=s.pj>0?Math.round(s.w/s.pj*100):0;h+=`<tr><td>${ci===0?year:''}</td><td style="font-size:.7rem;color:${cat==='senior'?'var(--cyan)':'#aaa'}">${cat==='senior'?'Sr':'Lib'}</td><td class="apps">${s.pj}</td><td style="font-size:.75rem;color:var(--cyan)">${pd}</td><td class="goals">${s.goals}</td><td style="color:#aaa;font-family:'Bebas Neue',sans-serif">${s.pens||0}</td><td style="color:var(--cyan);font-family:'Bebas Neue',sans-serif;font-size:.9rem">${gpp}</td><td style="color:var(--gl);font-family:'Bebas Neue',sans-serif">${s.w}</td><td style="color:var(--gold);font-family:'Bebas Neue',sans-serif">${s.d}</td><td style="color:#e66;font-family:'Bebas Neue',sans-serif">${s.l}</td><td style="color:var(--gold);font-size:.8rem">${wp}%</td><td class="reds">${s.reds||0}</td></tr>`;});if(showComb){const lib=yd.libres||{pj:0,goals:0,pens:0,reds:0,w:0,d:0,l:0};const sr2=yd.senior||{pj:0,goals:0,pens:0,reds:0,w:0,d:0,l:0};const cPJ=lib.pj+sr2.pj;const cG=lib.goals+sr2.goals;const cGpp=cPJ>0?(cG/cPJ).toFixed(2):'0.00';const cWp=cPJ>0?Math.round((lib.w+sr2.w)/cPJ*100):0;h+=`<tr style="background:rgba(255,255,255,.025);border-top:1px solid #333"><td style="color:#aaa;font-size:.72rem"></td><td style="font-size:.7rem;color:#777;font-style:italic">Total</td><td class="apps">${cPJ}</td><td style="font-size:.75rem;color:#666">—</td><td class="goals">${cG}</td><td style="color:#aaa;font-family:'Bebas Neue',sans-serif">${(lib.pens||0)+(sr2.pens||0)}</td><td style="color:var(--cyan);font-family:'Bebas Neue',sans-serif;font-size:.9rem">${cGpp}</td><td style="color:var(--gl);font-family:'Bebas Neue',sans-serif">${lib.w+sr2.w}</td><td style="color:var(--gold);font-family:'Bebas Neue',sans-serif">${lib.d+sr2.d}</td><td style="color:#e66;font-family:'Bebas Neue',sans-serif">${lib.l+sr2.l}</td><td style="color:var(--gold);font-size:.8rem">${cWp}%</td><td class="reds">${(lib.reds||0)+(sr2.reds||0)}</td></tr>`;}});
  h+=`</tbody></table></div>`;
  const matchList=[];ALL_YEARS.forEach(year=>{['libres','senior'].forEach(cat=>{if(cat==='senior'&&!SENIOR_YEARS_SET.has(year))return;getMs(year,cat).forEach(m=>{const inSq=(m.squad||{})[name];const sg=(m.scorers||[]).filter(s=>!s.own_goal&&canonicalName(s.name)===name);if(inSq||sg.length)matchList.push({m,year,cat,status:inSq,sg});});});});
  if(matchList.length){h+=`<div class="pd-matches-title">ÚLTIMOS PARTIDOS (${matchList.length} total)</div><div class="match-list">`;[...matchList].slice(-10).reverse().forEach(({m,year,cat,status,sg})=>{const comp=[m.competition,m.phase].filter(x=>x&&x!='nan').join(' · ');const meta=[comp,m.date].filter(Boolean).join(' · ');const pw=m.pen_win??null;const sc=sg.map(s=>`${s.count>1?s.count+'× ':''}⚽${s.penalty?' (p)':''}`).join(' ');const rl=status?(SI[status]?.l||status):'';h+=`<div class="match-row" onclick="openDetail('${year}','${m.id}','${cat}')"><div><div class="match-opp">${m.opponent}${cat==='senior'?' <span style="font-size:.65rem;color:var(--cyan)">[Sr]</span>':''}</div><div class="match-meta"><span>${year}</span>${meta?`<span>${meta}</span>`:''}${rl?`<span style="font-size:.65rem;color:${status==='titular'?'var(--c-t)':'var(--c-se)'}">${rl}</span>`:''}${sc?`<span style="color:var(--gold);font-weight:600">${sc}</span>`:''}</div></div><div class="match-score" style="${ss(m.result,pw)}">${m.score}</div><span class="badge ${badgeClass(m.result,pw)}">${badgeText(m.result,pw)}</span><div class="match-scorers"></div></div>`;});h+=`</div>`;}
  document.getElementById('b-player-detail').innerHTML=h;
}

function init(){buildYT('yt-r',renderResumen);buildYT('yt-p',renderPartidos);buildYT('yt-j',renderJugadores);buildCT('ct-r');buildCT('ct-p');buildCT('ct-j');renderResumen(curYear);renderPartidos(curYear);renderJugadores(curYear);}
init();
</script>
